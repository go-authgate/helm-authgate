name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update dependencies
        run: helm dependency update .

      - name: Helm lint
        run: helm lint .

  template:
    name: Template Validation
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        include:
          - name: sqlite-default
            args: ""
          - name: ha-external
            args: "--set database.driver=postgres --set replicaCount=3 --set externalDatabase.host=pg --set externalRedis.addr=redis:6379 --set metrics.enabled=true"
          - name: ha-subchart
            values: ci/values-ha.yaml
          - name: sqlite-multi-replica-should-fail
            args: "--set replicaCount=2 --set database.driver=sqlite"
            expect_failure: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update dependencies
        run: helm dependency update .

      - name: Template render (${{ matrix.name }})
        run: |
          set +e
          if [ -n "${{ matrix.values }}" ]; then
            helm template test . -f ${{ matrix.values }} 2>&1
            result=$?
          else
            helm template test . ${{ matrix.args }} 2>&1
            result=$?
          fi

          if [ "${{ matrix.expect_failure }}" = "true" ]; then
            if [ $result -eq 0 ]; then
              echo "::error::Expected template to fail but it succeeded"
              exit 1
            else
              echo "Template failed as expected"
              exit 0
            fi
          else
            exit $result
          fi

  k3d-test:
    name: k3d Integration (${{ matrix.mode }})
    runs-on: ubuntu-latest
    needs: template
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: sqlite
            values: ci/values-sqlite.yaml
            release: authgate-sqlite
          - mode: ha
            values: ci/values-ha.yaml
            release: authgate-ha
            timeout: 300s
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create k3d cluster
        uses: AbsaOSS/k3d-action@v2
        with:
          cluster-name: authgate-ci
          args: >-
            -p "8080:80@loadbalancer"
            --wait

      - name: Update dependencies
        run: helm dependency update .

      - name: Install (${{ matrix.mode }})
        run: |
          kubectl create namespace authgate-ci
          helm install ${{ matrix.release }} . \
            --namespace authgate-ci \
            -f ${{ matrix.values }} \
            --wait \
            --timeout ${{ matrix.timeout || '120s' }}

      - name: Wait for pods
        run: |
          kubectl wait --namespace authgate-ci \
            --for=condition=ready pod \
            -l app.kubernetes.io/name=authgate \
            --timeout=180s

      - name: Health check
        run: |
          kubectl run health-check \
            --namespace authgate-ci \
            --rm -i --restart=Never \
            --image=busybox:1.36 -- \
            wget --no-verbose --tries=3 --spider \
            "http://${{ matrix.release }}-authgate:80/health"

      - name: Helm test
        run: helm test ${{ matrix.release }} --namespace authgate-ci --timeout 60s

      - name: Pod status on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods --namespace authgate-ci -o wide
          echo "=== Events ==="
          kubectl get events --namespace authgate-ci --sort-by='.lastTimestamp'
          echo "=== Logs ==="
          kubectl logs --namespace authgate-ci -l app.kubernetes.io/name=authgate --tail=50 || true

      - name: Uninstall
        if: always()
        run: helm uninstall ${{ matrix.release }} --namespace authgate-ci --wait || true
