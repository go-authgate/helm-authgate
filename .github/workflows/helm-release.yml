name: Release Helm Chart (OCI)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version from tag
        id: tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify Chart.yaml version matches tag
        run: |
          chart_version=$(grep '^version:' Chart.yaml | awk '{print $2}')
          tag_version="${{ steps.tag.outputs.version }}"
          if [ "$chart_version" != "$tag_version" ]; then
            echo "::error::Chart.yaml version ($chart_version) does not match tag (v$tag_version)"
            exit 1
          fi

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update dependencies
        run: helm dependency update .

      - name: Package Helm chart
        run: helm package .

      - name: Push to GHCR
        run: |
          helm push authgate-${{ steps.tag.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository }}
