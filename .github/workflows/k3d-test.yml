name: k3d Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  k3d-test:
    name: k3d (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: single-postgres
            values: ci/values-single-postgres.yaml
            release: authgate-single
            timeout: 180s
          - mode: ha
            values: ci/values-ha.yaml
            release: authgate-ha
            timeout: 300s
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Get app version
        id: version
        run: echo "APP_VERSION=$(grep appVersion Chart.yaml | awk '{print $2}' | tr -d '\"')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull authgate image
        run: docker pull ghcr.io/go-authgate/authgate:${{ steps.version.outputs.APP_VERSION }}

      - name: Create k3d cluster
        uses: AbsaOSS/k3d-action@v2
        with:
          cluster-name: authgate-ci
          args: >-
            -p "8080:80@loadbalancer"
            --k3s-arg "--disable=metrics-server@server:0"
            --wait

      - name: Wait for cluster ready
        run: |
          kubectl wait --for=condition=Ready nodes --all --timeout=120s
          kubectl wait --for=condition=Available deployment/coredns -n kube-system --timeout=120s
          kubectl cluster-info

      - name: Import image into k3d
        run: k3d image import ghcr.io/go-authgate/authgate:${{ steps.version.outputs.APP_VERSION }} -c authgate-ci

      - name: Update dependencies
        run: helm dependency update .

      - name: Install (${{ matrix.mode }})
        run: |
          helm install ${{ matrix.release }} . \
            --create-namespace \
            --namespace authgate-ci \
            -f ${{ matrix.values }} \
            --set image.pullPolicy=IfNotPresent \
            --wait \
            --timeout ${{ matrix.timeout }}

      - name: Health check
        run: |
          kubectl run health-check \
            --namespace authgate-ci \
            --rm -i --restart=Never \
            --image=busybox:1.36 -- \
            wget --no-verbose --tries=3 --spider \
            "http://${{ matrix.release }}-authgate:80/health"

      - name: Helm test
        run: helm test ${{ matrix.release }} --namespace authgate-ci --timeout 60s

      - name: Pod status on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods --namespace authgate-ci -o wide
          echo "=== Describe failing pods ==="
          kubectl describe pods --namespace authgate-ci -l app.kubernetes.io/name=authgate
          echo "=== Describe PostgreSQL pods ==="
          kubectl describe pods --namespace authgate-ci -l app.kubernetes.io/name=postgresql || true
          echo "=== Events ==="
          kubectl get events --namespace authgate-ci --sort-by='.lastTimestamp'
          echo "=== AuthGate Logs ==="
          kubectl logs --namespace authgate-ci -l app.kubernetes.io/name=authgate --tail=100 || true
          echo "=== PostgreSQL Logs ==="
          kubectl logs --namespace authgate-ci -l app.kubernetes.io/name=postgresql --tail=50 || true

      - name: Uninstall
        if: always()
        run: helm uninstall ${{ matrix.release }} --namespace authgate-ci --wait || true
