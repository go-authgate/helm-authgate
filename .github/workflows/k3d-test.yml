name: k3d Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  k3d-test:
    name: k3d (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: sqlite
            values: ci/values-sqlite.yaml
            release: authgate-sqlite
            timeout: 120s
          - mode: ha
            values: ci/values-ha.yaml
            release: authgate-ha
            timeout: 300s
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Checkout authgate source
        uses: actions/checkout@v4
        with:
          repository: go-authgate/authgate
          path: authgate-src

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: authgate-src/go.mod
          check-latest: true

      - name: Build authgate binary
        working-directory: authgate-src
        run: make build_linux_amd64

      - name: Build Docker image
        run: |
          docker build \
            -f authgate-src/docker/Dockerfile \
            -t ghcr.io/go-authgate/authgate:${{ fromJSON('"' }}$(grep appVersion Chart.yaml | awk '{print $2}' | tr -d '"')${{ fromJSON('"') }} \
            authgate-src

      - name: Create k3d cluster
        uses: AbsaOSS/k3d-action@v2
        with:
          cluster-name: authgate-ci
          args: >-
            -p "8080:80@loadbalancer"
            --wait

      - name: Import image into k3d
        run: |
          APP_VERSION=$(grep appVersion Chart.yaml | awk '{print $2}' | tr -d '"')
          k3d image import ghcr.io/go-authgate/authgate:${APP_VERSION} -c authgate-ci

      - name: Update dependencies
        run: helm dependency update .

      - name: Install (${{ matrix.mode }})
        run: |
          kubectl create namespace authgate-ci
          helm install ${{ matrix.release }} . \
            --namespace authgate-ci \
            -f ${{ matrix.values }} \
            --set image.pullPolicy=IfNotPresent \
            --wait \
            --timeout ${{ matrix.timeout }}

      - name: Wait for pods
        run: |
          kubectl wait --namespace authgate-ci \
            --for=condition=ready pod \
            -l app.kubernetes.io/name=authgate \
            --timeout=180s

      - name: Health check
        run: |
          kubectl run health-check \
            --namespace authgate-ci \
            --rm -i --restart=Never \
            --image=busybox:1.36 -- \
            wget --no-verbose --tries=3 --spider \
            "http://${{ matrix.release }}-authgate:80/health"

      - name: Helm test
        run: helm test ${{ matrix.release }} --namespace authgate-ci --timeout 60s

      - name: Pod status on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods --namespace authgate-ci -o wide
          echo "=== Describe failing pods ==="
          kubectl describe pods --namespace authgate-ci -l app.kubernetes.io/name=authgate
          echo "=== Events ==="
          kubectl get events --namespace authgate-ci --sort-by='.lastTimestamp'
          echo "=== Logs ==="
          kubectl logs --namespace authgate-ci -l app.kubernetes.io/name=authgate --tail=100 || true

      - name: Uninstall
        if: always()
        run: helm uninstall ${{ matrix.release }} --namespace authgate-ci --wait || true
