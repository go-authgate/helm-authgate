apiVersion: v2
name: authgate
description: A lightweight, production-ready OAuth 2.0 / OpenID Connect Authorization Server with PKCE and Device Flow support
type: application
version: 0.1.2
appVersion: "0.24.0"
keywords:
  - oauth
  - oauth2
  - authorization-server
  - oidc
  - openid-connect
  - pkce
  - device-flow
  - jwt
  - token
  - authentication
  - identity
  - sso
  - api-security
home: https://github.com/go-authgate/helm-authgate
icon: https://avatars.githubusercontent.com/u/262696724?v=4
sources:
  - https://github.com/go-authgate/helm-authgate
  - https://github.com/go-authgate/authgate
maintainers:
  - name: AuthGate Team
    url: https://github.com/go-authgate
dependencies:
  - name: postgresql
    version: "18.5.15"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: redis
    version: "25.3.9"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
